<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBot - Panel de Control</title>
    <!-- Cargamos la librería para comunicarse con Flask -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    
    <style>
        body { background-color: #121212; color: white; text-align: center; font-family: sans-serif; }
        #video-feed { margin: 20px auto; border: 2px solid #333; }
        .status { margin: 20px; padding: 15px; background: #1e1e1e; border-radius: 8px; display: inline-block; }
    </style>
</head>
<body>
    <h1>OmniBot</h1>
    
    <!-- Aquí se muestra el video de ustreamer -->
    <div id="video-feed">
        <img src="http://192.168.100.66:8080/stream" width="640" height="480" alt="Video">
    </div>

    <div class="status">
        <strong>Control:</strong> Usa W, A, S, D<br>
        Vector X: <span id="val-x">127</span> | Vector Y: <span id="val-y">127</span>
    </div>

    <script>
        const socket = io(); // Conecta con el servidor Python

        document.addEventListener('keydown', function(event) {
            let x = 127; // Valor neutro
            let y = 127; // Valor neutro

            // Mapeo de teclas
            if (event.key === 'w' || event.key === 'W') y = 255;
            if (event.key === 's' || event.key === 'S') y = 0;
            if (event.key === 'a' || event.key === 'A') x = 0;
            if (event.key === 'd' || event.key === 'D') x = 255;

            // Enviamos el mensaje al servidor solo si hay cambio
            if (x !== 127 || y !== 127) {
                socket.emit('mensaje_tecla', { x: x, y: y });
                
                // Actualizamos los números en pantalla para ver que funciona
                document.getElementById('val-x').innerText = x;
                document.getElementById('val-y').innerText = y;
            }
        });
    </script>
</body>
</html>
